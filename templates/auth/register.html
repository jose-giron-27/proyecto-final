{% extends "base.html" %}

{% block title %}
Crear cuenta | AutoMenu AI
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8 col-lg-7">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-3">

                    <div class="display-3">

                        🤖

                    </div>

                </div>

                <h2 class="fw-bold text-center mb-3">

                    Crear cuenta

                </h2>

                <p class="text-center text-muted mb-5">

                 Comenzá a crear menús digitales inteligentes para tu restaurante.

                </p>
                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Correo electrónico
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control form-control-lg"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Contraseña
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control form-control-lg"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg w-100">

                            Crear cuenta

                        </button>

                    </div>

                </form>

                <hr>

                <p class="text-center mb-0">

                    ¿Ya tenés una cuenta?

                    <a
                        href="/login"
                        class="text-decoration-none fw-semibold">

                        Iniciá sesión

                     </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
