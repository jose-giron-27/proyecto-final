{% extends "base.html" %}

{% block title %}
Crear cuenta | AutoMenu AI
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8 col-lg-7">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">
                    Crear cuenta
                </h2>

                <p class="text-center text-muted mb-4">
                    Registrá tu restaurante y comenzá a crear menús inteligentes.
                </p>

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Nombre del propietario
                            </label>

                            <input
                                type="text"
                                name="owner_name"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Nombre del restaurante
                            </label>

                            <input
                                type="text"
                                name="restaurant_name"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Correo electrónico
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Tipo de restaurante
                        </label>

                        <select
                            class="form-select"
                            name="restaurant_type"
                            required>

                            <option value="">
                                Seleccioná una opción
                            </option>

                            <option>Comida rápida</option>

                            <option>Restaurante familiar</option>

                            <option>Cafetería</option>

                            <option>Pizzería</option>

                            <option>Taquería</option>

                            <option>Otro</option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Contraseña
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">

                            Crear cuenta

                        </button>

                    </div>

                </form>

                <hr>

                <p class="text-center mb-0">

                    ¿Ya tenés una cuenta?

                    <a href="/login">
                        Iniciá sesión
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
