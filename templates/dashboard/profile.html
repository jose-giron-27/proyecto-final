{% extends "base.html" %}

{% block title %}
Perfil del Restaurante | AutoMenu AI
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-3">
                        Perfil del restaurante
                    </h2>

                    <p class="text-muted mb-5">
                        Configurá la información que aparecerá en tu menú digital.
                    </p>

                    <form method="POST">
                        <div class="card shadow-lg border-0 rounded-4">

                            <div class="card-body p-5">

                                <!-- aquí va TODO el formulario -->

                            </div>

                         </div>
                        <div class="mb-3">
                            <label class="form-label">Nombre del restaurante</label>
                            <input
                                 type="text"
                                 name="nombre"
                                 class="form-control"
                                 value="{{ restaurante.nombre if restaurante else '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Logo (URL)</label>
                            <input
                             type="url"
                             name="logo"
                             class="form-control form-control-lg"
                            value="{{ restaurante.logo if restaurante else '' }}">
                        
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea
                             name="descripcion"
                             class="form-control"
                             rows="3">{{ restaurante.descripcion if restaurante else '' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input
                             type="text"
                             name="direccion"
                             class="form-control"
                            value="{{ restaurante.direccion if restaurante else '' }}">
                                
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Horarios</label>
                            <input
                             type="text"
                             name="horarios"
                             class="form-control"
                             value="{{ restaurante.horarios if restaurante else '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input
                             type="text"
                             name="telefono"
                             class="form-control"
                             value="{{ restaurante.telefono if restaurante else '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">WhatsApp</label>
                            <input
                              type="text"
                             name="whatsapp"
                             class="form-control form-control-lg"
                             value="{{ restaurante.whatsapp if restaurante else '' }}">
                    
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Instagram</label>
                            <input
                             type="text"
                             name="instagram"
                             class="form-control form-control-lg"
                             value="{{ restaurante.instagram if restaurante else '' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tipo de comida</label>
                            <input
                             type="text"
                             name="tipo_comida"
                             class="form-control"
                             value="{{ restaurante.tipo_comida if restaurante else '' }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Imagen de portada (URL)</label>
                            <input
                             type="url"
                             name="imagen_portada"
                             class="form-control"
                             value="{{ restaurante.imagen_portada if restaurante else '' }}">
                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-success btn-lg w-100">

                                Guardar cambios

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
