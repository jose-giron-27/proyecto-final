{% extends "base.html" %}

{% block title %}
Restaurant QR
{% endblock %}

{% block content %}

<div class="container py-5 text-center">

    <h1 class="mb-4">
        Your Menu QR Code
    </h1>

    <p class="text-muted">
        Customers can scan this QR code to access your public menu.
    </p>

    <img
        src="{{ url_for('generate_qr', slug=restaurante.slug) }}"
        class="img-fluid shadow rounded"
        style="max-width:300px;">

</div>

{% endblock %}
